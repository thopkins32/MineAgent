name: pre-commit

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          pixi-version: v0.60.0
          cache: false
          frozen: false
          locked: true
          environments: "dev"

      - name: Run pytest
        run: pixi run -e dev pre-commit run --all-files

