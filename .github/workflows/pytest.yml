name: Run pytest

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  test:
    runs-on: ${{ matrix.host-os }}
    steps:
     - name: Checkout
       uses: actions/checkout@v4

     - uses: prefix-dev/setup-pixi@v0.9.4

     - name: Run pytest
       run: pixi run pytest ./tests

